name: Build release APK

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: yes | sdkmanager "platforms;android-36" "build-tools;35.0.0" > /dev/null

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            name="${{ github.event.release.tag_name }}"
            name="${name#v}"
          else
            name="0.0.0-dev"
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: >
          ./gradlew assembleRelease
          -PappVersionName=${{ steps.version.outputs.name }}
          -PappVersionCode=${{ github.run_number }}

      - name: Name the APK with the version
        run: cp app/build/outputs/apk/release/app-release.apk "shaw-cw-${{ steps.version.outputs.name }}.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: shaw-cw-apk
          path: shaw-cw-*.apk

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: shaw-cw-*.apk
